<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact Us | Today's Choice Organic Limited</title>
<link rel="stylesheet" href="./css/contact.css">

<!-- EmailJS SDK -->
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
<script>
  (function(){
    emailjs.init("YOUR_PUBLIC_KEY");
  })();
</script>
</head>
<body>

<header class="contact-header">
  <div class="container">
    <h1>Contact Us</h1>
    <p>We’re here to support your wellness journey</p>
  </div>
</header>

<section class="contact-section">
  <div class="container grid-2">

    <!-- CONTACT FORM -->
    <div class="form-box">
      <h2>General Enquiry</h2>
      <form id="contactForm">
        <input type="text" id="name" placeholder="Full Name" required>
        <input type="email" id="email" placeholder="Email Address" required>
        <input type="tel" id="phone" placeholder="Phone Number" required>
        <textarea id="message" rows="4" placeholder="Your Message" required></textarea>
        <button type="submit">Send Message</button>
      </form>
      <p id="formStatus"></p>
    </div>

    <!-- DISTRIBUTOR FORM -->
    <div class="form-box">
      <h2>Distributor Partnership Inquiry</h2>
      <form id="distributorForm">
        <input type="text" id="dname" placeholder="Full Name / Company Name" required>
        <input type="email" id="demail" placeholder="Email Address" required>
        <input type="text" id="location" placeholder="Business Location" required>
        <textarea id="dmessage" rows="4" placeholder="Tell us about your distribution interest" required></textarea>
        <button type="submit">Submit Inquiry</button>
      </form>
      <p id="distributorStatus"></p>
    </div>

  </div>
</section>

<section class="social-section">
  <div class="container">
    <h2>Connect With Us</h2>
    <div class="social-icons">
      <a href="https://www.facebook.com/share/16i3WnTHdz/" target="_blank">🌿 Facebook</a>
      <a href="https://www.instagram.com/todays_choice_beauty?utm_source=qr&igsh=MWwwYnI4bXg0dWUybw" target="_blank">🌿 Instagram</a>
      <a href="http://tiktok.com/@todayschoiceorganics" target="_blank">🌿 TikTok</a>
      <a href="https://wa.me/2348073555226" target="_blank">🌿 WhatsApp</a>
    </div>
  </div>
</section>

<footer>
  <p>© 2026 Today's Choice Organic Limited. All Rights Reserved.</p>
</footer>

<script src="contact.js"></script>
</body>

</html>
