<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Products | TCOL</title>

<link rel="stylesheet" href="nshop.css">

<script src="https://js.paystack.co/v1/inline.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>

<body>

<header class="header">
    <img src="./images/white logo.png" class="logo">
    <h1>Today's Choice Organic Limited</h1>
</header>

<section class="product-grid" id="productGrid"></section>

<section class="shipping-section">
    <h2>Shipping Details</h2>
    <form id="shippingForm">
        <input type="text" id="name" placeholder="Name" required>
        <input type="text" id="address" placeholder="Address" required>
        <input type="text" id="city" placeholder="City" required>
        <input type="text" id="state" placeholder="State" required>
        <input type="text" id="country" placeholder="Country" required>
        <input type="text" id="postcode" placeholder="Post Code" required>
        <input type="tel" id="phone" placeholder="Phone" required>
        <input type="email" id="email" placeholder="Email" required>
    </form>
</section>

<section class="delivery-section">
    <h2>Delivery</h2>
    <select id="deliveryType">
        <option value="">Select Delivery Type</option>
        <option value="local">Local (Nigeria)</option>
        <option value="international">International</option>
    </select>

    <select id="locationSelect"></select>
</section>

<section class="summary-section">
    <h2>Order Summary</h2>
    <div id="summary"></div>
    <h3>Total: ₦<span id="total">0</span></h3>
    <button onclick="pay()">Pay with Paystack</button>
    <!-- <button onclick="bankTransfer()">Bank Transfer</button> -->
</section>

<section class="invoice-section" id="invoiceSection">
    <div id="invoiceContent"></div>
    <button onclick="downloadPDF()">Download PDF</button>
</section>

<section class="reviews">
    <h2>Customer Reviews</h2>
    <div id="reviewList"></div>
</section>

<script src="shopscript.js"></script>
</body>
</html>
